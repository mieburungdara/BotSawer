name: Auto Deploy Bot Sawer

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      # Langkah Composer sudah dihapus total dari sini

      - name: 🚀 Sync via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: vesper/
          dry-run: false
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            **/node_modules/**
            PHP/**

      - name: 🔄 Auto Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          script: |
            mkdir -p /home/boxanonm/public_html/vesper/tmp
            touch /home/boxanonm/public_html/vesper/tmp/restart.txt

      - name: 📱 Send Telegram Notification
        if: success()
        run: |
          TIME=$(date +'%Y-%m-%d %H:%M:%S')
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          TEXT="✅ *Deploy Berhasil!*%0A(Direct FTP - Tanpa Composer)%0A%0A*Repo:* $REPO%0A*Pusher:* $ACTOR%0A*Waktu:* $TIME"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT" \
            -d "parse_mode=Markdown"

