<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Sawer - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Memuat...</p>
        </div>

        <div class="auth-error" id="authError" style="display: none;">
            <h2>Akses Ditolak</h2>
            <p>Aplikasi ini hanya bisa diakses melalui Telegram.</p>
        </div>

        <div class="main-app" id="mainApp" style="display: none;">
            <header class="app-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>Bot Sawer</h1>
                    <div class="user-info">
                        <span id="userName">Loading...</span>
                    </div>
                </div>
                
                <div class="header-stats">
                    <div class="h-stat-item">
                        <i data-lucide="wallet"></i>
                        <div class="h-stat-info">
                            <span class="label">Saldo</span>
                            <span id="h-balance" class="value">Rp 0</span>
                        </div>
                    </div>
                    <div class="h-stat-item">
                        <i data-lucide="trending-up"></i>
                        <div class="h-stat-info">
                            <span class="label">Total Earning</span>
                            <span id="h-income" class="value">Rp 0</span>
                        </div>
                    </div>
                    <div class="h-stat-item">
                        <i data-lucide="arrow-up-circle"></i>
                        <div class="h-stat-info">
                            <span class="label">Penarikan</span>
                            <span id="h-withdraw" class="value">Rp 0</span>
                        </div>
                    </div>
                </div>
            </header>

            <nav class="app-nav">
                <button class="nav-btn active" data-page="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </button>
                <button class="nav-btn" data-page="wallet">
                    <i data-lucide="wallet"></i>
                    Dompet
                </button>
                <button class="nav-btn creator-only" data-page="creator" style="display: none;">
                    <i data-lucide="bar-chart-3"></i>
                    Statistik
                </button>
                <button class="nav-btn creator-only" data-page="contents" style="display: none;">
                    <i data-lucide="layers"></i>
                    Konten
                </button>
                <button class="nav-btn admin-only" data-page="admin" style="display: none;">
                    <i data-lucide="shield-check"></i>
                    Admin
                </button>
            </nav>

            <main class="app-content">
                <div id="pageContent">
                    <!-- Dynamic content loaded here -->
                </div>
            </main>
        </div>
    </div>

    <script src="js/chart.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/telegram-web-app.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
