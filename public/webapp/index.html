<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Sawer - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Memuat...</p>
        </div>

        <div class="auth-error" id="authError" style="display: none;">
            <h2>Akses Ditolak</h2>
            <p>Aplikasi ini hanya bisa diakses melalui Telegram.</p>
        </div>

        <div class="main-app" id="mainApp" style="display: none;">
            <header class="app-header">
                <h1>Bot Sawer Dashboard</h1>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                </div>
            </header>

            <nav class="app-nav">
                <button class="nav-btn active" data-page="dashboard">Dashboard</button>
                <button class="nav-btn" data-page="wallet">Dompet</button>
                <button class="nav-btn" data-page="history">Riwayat</button>
                <button class="nav-btn creator-only" data-page="creator" style="display: none;">Kreator</button>
                <button class="nav-btn admin-only" data-page="admin" style="display: none;">Admin</button>
            </nav>

            <main class="app-content">
                <div id="pageContent">
                    <!-- Dynamic content loaded here -->
                </div>
            </main>
        </div>
    </div>

    <script src="js/chart.min.js"></script>
    <script src="js/telegram-web-app.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
