<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VesperApp - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #17212b; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { color: #24a1de; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VesperApp</h1>
        <p id="user-info">Memuat data...</p>
        <button id="main-btn" style="background: #24a1de; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Cek Status</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userInfo = document.getElementById('user-info');
        if (tg.initDataUnsafe.user) {
            userInfo.innerText = `Halo, ${tg.initDataUnsafe.user.first_name}!`;
        } else {
            userInfo.innerText = "Akses via Telegram WebApp";
        }
    </script>
</body>
</html>
